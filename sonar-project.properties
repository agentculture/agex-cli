sonar.projectKey=OriNachum_agent-experience
sonar.organization=orinachum

# Displayed in SonarCloud UI
sonar.projectName=agent-experience

# Source layout
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python: target versions (matches CI matrix)
sonar.python.version=3.10, 3.11, 3.12, 3.13

# Coverage report (generated by pytest-cov in build.yml)
sonar.python.coverage.reportPaths=coverage.xml

# S5496 triggers on render_string() because it renders a Jinja template with a
# caller-provided context. In our project templates are always shipped with the
# package (never user-controlled) and the output is markdown consumed by LLMs
# / the terminal — never rendered in an HTML context. Auto-escape is disabled
# deliberately (see select_autoescape([]) in render.py). Rule is disabled only
# for this one file.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=pythonsecurity:S5496
sonar.issue.ignore.multicriteria.e1.resourceKey=src/agent_experience/core/render.py
