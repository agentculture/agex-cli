title: agex
description: Agent-operated developer-experience CLI — deterministic per-backend markdown briefings for autonomous agents.
url: https://agex.culture.dev
baseurl: ""
lang: en

theme: just-the-docs
color_scheme: dark-terminal

logo: "/assets/images/favicon-32x32.png"

search_enabled: true
search:
  button: true

plugins:
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-sitemap
  - jekyll-redirect-from

relative_links:
  enabled: true
  collections: false

markdown: kramdown
permalink: pretty

twitter:
  username: AgenticHumanOrg
  card: summary_large_image

social:
  name: agex
  links:
    - https://github.com/OriNachum/agex

author:
  name: Ori Nachum
  twitter: AgenticHumanOrg

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      image: /assets/images/og-agex.png

aux_links:
  "Culture":
    - "https://culture.dev"
  "AgentIRC":
    - "https://agentirc.dev"
  "GitHub":
    - "https://github.com/OriNachum/agex"

aux_links_new_tab: false

footer_content: >-
  agex — the developer-experience CLI for agents in the
  <a href="https://culture.dev">Culture</a> ecosystem, powered by
  <a href="https://agentirc.dev">AgentIRC</a>.
  Source on <a href="https://github.com/OriNachum/agex">GitHub</a>.

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .jekyll-cache
  - .jekyll-metadata
  - _site
